# Halford AI QS & Planning Workbench — full development stack.
#
# Brings up:
#   postgres    — relational DB for projects, drawings, elements, scenarios
#   timescale   — time-series DB for monitoring/usage telemetry
#   minio       — S3-compatible object store for drawings + outputs
#   redis       — cache + BullMQ job queue
#   keycloak    — OIDC identity provider (realm: halford)
#   solver      — Python service: OR-Tools + DEAP + SimPy + IfcOpenShell + PyMuPDF + LightGBM
#   server      — Node.js API + UI
#
# Bring up:  docker compose up -d
# Tail logs: docker compose logs -f server

services:
  postgres:
    image: postgres:16-alpine
    container_name: halford-postgres
    environment:
      POSTGRES_DB: halford
      POSTGRES_USER: halford
      POSTGRES_PASSWORD: halford
    ports: ["5432:5432"]
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U halford -d halford"]
      interval: 5s
      timeout: 3s
      retries: 10

  timescale:
    image: timescale/timescaledb:latest-pg16
    container_name: halford-timescale
    environment:
      POSTGRES_DB: halford_metrics
      POSTGRES_USER: halford
      POSTGRES_PASSWORD: halford
    ports: ["5433:5432"]
    volumes:
      - timescale-data:/var/lib/postgresql/data
      - ./infra/timescale-init:/docker-entrypoint-initdb.d:ro

  minio:
    image: minio/minio:latest
    container_name: halford-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: halford
      MINIO_ROOT_PASSWORD: halford-dev-secret
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # console
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 3s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: halford-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 halford halford-dev-secret;
      mc mb -p local/halford-drawings || true;
      mc mb -p local/halford-outputs  || true;
      mc anonymous set download local/halford-outputs;
      echo 'minio buckets ready';
      "

  redis:
    image: redis:7-alpine
    container_name: halford-redis
    ports: ["6379:6379"]
    command: ["redis-server", "--save", "60", "1"]
    volumes:
      - redis-data:/data

  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    container_name: halford-keycloak
    command: ["start-dev", "--import-realm"]
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: dev-mem
    ports: ["8080:8080"]
    volumes:
      - ./infra/keycloak/halford-realm.json:/opt/keycloak/data/import/halford-realm.json:ro

  solver:
    build:
      context: ./solver
    container_name: halford-solver
    ports: ["8001:8001"]
    environment:
      LOG_LEVEL: INFO
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 3s
      retries: 5

  server:
    build:
      context: ./server
    container_name: halford-server
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      PORT: 3000
      DATABASE_URL: postgres://halford:halford@postgres:5432/halford
      TIMESCALE_URL: postgres://halford:halford@timescale:5432/halford_metrics
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: halford
      MINIO_SECRET_KEY: halford-dev-secret
      MINIO_DRAWINGS_BUCKET: halford-drawings
      MINIO_OUTPUTS_BUCKET: halford-outputs
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: halford
      KEYCLOAK_CLIENT_ID: halford-frontend
      SOLVER_URL: http://solver:8001
      APS_CLIENT_ID: ${APS_CLIENT_ID}
      APS_CLIENT_SECRET: ${APS_CLIENT_SECRET}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    ports: ["3000:3000"]
    volumes:
      - ./halford_ai_qs_workbench.html:/app/halford_ai_qs_workbench.html:ro

volumes:
  postgres-data:
  timescale-data:
  minio-data:
  redis-data:
