# Render.com Blueprint — provisions Halford as a single web service with a persistent
# disk for project state, uploads, exports, and the APS Properties Database cache.
#
# Deploy:
#   1. Push this repo to GitHub.
#   2. In Render dashboard → New → Blueprint → connect repo. Render reads this file.
#   3. Set the secret env vars marked `sync: false` below in the Render dashboard:
#        - ANTHROPIC_API_KEY
#        - APS_CLIENT_ID
#        - APS_CLIENT_SECRET
#   4. After first deploy, copy the service URL (e.g. https://halford.onrender.com)
#      and (a) add it as an APS Allowed Callback URL: `<URL>/api/aps/auth/callback`
#      (b) optionally set APS_WEBHOOK_URL=<URL>/api/aps/webhooks/callback so
#          translation events push to the server instead of polling.
#
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: halford-ai-qs-workbench
    runtime: node
    plan: free                # Free tier — no persistent disk; data wipes on restart.
                              # Keep-alive workflow at .github/workflows/keepalive.yml
                              # pings /healthz every 10 min so the instance never sleeps.
                              # Upgrade to `starter` ($7/mo) when you need persistence.
    region: frankfurt
    buildCommand: cd server && npm install
    startCommand: cd server && npm start
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: ANTHROPIC_API_KEY
        sync: false           # Set in Render dashboard
      - key: APS_CLIENT_ID
        sync: false
      - key: APS_CLIENT_SECRET
        sync: false
      - key: APS_WEBHOOK_URL
        sync: false           # Optional — set after first deploy with the public URL
